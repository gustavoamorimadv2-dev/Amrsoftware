<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Área</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
background:#f2f2f7;
padding:20px;
}

header{
text-align:center;
margin-bottom:30px;
}

header h1{
font-size:22px;
font-weight:600;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

.card{
background:#fff;
border-radius:28px;
padding:30px 20px;
text-align:center;
box-shadow:0 8px 25px rgba(0,0,0,.05);
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:45px;
margin-bottom:10px;
}

.card p{
font-size:14px;
font-weight:500;
}
</style>
</head>

<body>

<header>
<h1>Meu Processo</h1>
</header>

<div class="grid">

<div class="card" onclick="abrir('acordos')">
<img src="https://img.icons8.com/ios-filled/100/000000/agreement.png"/>
<p>Acordos</p>
</div>

<div class="card" onclick="abrir('documentos')">
<img src="https://img.icons8.com/ios-filled/100/000000/document.png"/>
<p>Documentos</p>
</div>

<div class="card" onclick="abrir('processos')">
<img src="https://img.icons8.com/ios-filled/100/000000/document.png"/>
<p>Documentos</p>
</div>

<div class="card" onclick="abrir('alertas')">
<img src="https://img.icons8.com/ios-filled/100/000000/appointment-reminders.png"/>
<p>Alertas</p>
</div>

<div class="card" onclick="abrir('audiencias')">
<img src="https://img.icons8.com/ios-filled/100/000000/court.png"/>
<p>Audiências</p>
</div>

</div>

<script>
function abrir(pagina){
alert("Abrir página: " + pagina);
}
</script>

</body>
</html>
