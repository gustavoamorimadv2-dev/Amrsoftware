<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AMR ADV - Dashboard</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
  background: #0f172a;
  color: white;
  min-height: 100vh;
  padding: 40px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 40px;
}

.header h1 {
  font-size: 22px;
}

.logout {
  background: #ef4444;
  border: none;
  padding: 10px 18px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

.logout:hover {
  background: #dc2626;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

.card {
  background: #111827;
  padding: 30px;
  border-radius: 14px;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
  border: 1px solid #1f2937;
}

.card:hover {
  background: #1f2937;
  transform: translateY(-4px);
}

.card h2 {
  font-size: 18px;
  margin-bottom: 10px;
}

.card p {
  font-size: 13px;
  color: #9ca3af;
}
</style>
</head>
<body>

<div class="header">
  <h1>Painel Administrativo</h1>
  <h1>Olá Edimar, seja bem vindo. </h1>
  <button class="logout" onclick="logout()">Sair</button>
</div>

<div class="grid">

  <div class="card" onclick="go('processos.html')">
    <h2>Processos</h2>
    <p>Gerencie todos os processos cadastrados.</p>
  </div>

  <div class="card" onclick="go('acordos.html')">
    <h2>Acordos</h2>
    <p>Controle acordos e negociações.</p>
  </div>

  <div class="card" onclick="go('documentos.html')">
    <h2>Documentos</h2>
    <p>Arquivos e documentos jurídicos.</p>
  </div>

  <div class="card" onclick="go('alertas.html')">
    <h2>Alertas</h2>
    <p>Prazos e notificações importantes.</p>
  </div>

  <div class="card" onclick="go('audiencias.html')">
    <h2>Audiências</h2>
    <p>Agenda e compromissos judiciais.</p>
  </div>

</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAFJJAqVf3ge0WDHBpmS9E6sXKvnjuFkhw",
    authDomain: "dapapp-38637.firebaseapp.com",
    projectId: "dapapp-38637",
    storageBucket: "dapapp-38637.appspot.com",
    messagingSenderId: "628852295313",
    appId: "1:628852295313:web:1234567890abcdef123456"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Proteção de rota
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = "index.html";
    }
  });

  window.logout = function() {
    signOut(auth).then(() => {
      window.location.href = "index.html";
    });
  }

  window.go = function(page) {
    window.location.href = page;
  }
</script>

</body>
</html>
