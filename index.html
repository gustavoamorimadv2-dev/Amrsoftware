<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AMR ADV - Login</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
  height: 100vh;
  background: #0f172a;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-container {
  background: #111827;
  padding: 40px;
  width: 100%;
  max-width: 380px;
  border-radius: 14px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  text-align: center;
}

.login-container h1 {
  color: #ffffff;
  font-size: 24px;
  margin-bottom: 10px;
}

.login-container p {
  color: #9ca3af;
  font-size: 14px;
  margin-bottom: 30px;
}

.input-group {
  margin-bottom: 18px;
}

.input-group input {
  width: 100%;
  padding: 14px;
  border-radius: 8px;
  border: none;
  background: #1f2937;
  color: white;
  font-size: 14px;
  outline: none;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 8px;
  border: none;
  background: #2563eb;
  color: white;
  font-weight: 600;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

.error {
  margin-top: 15px;
  font-size: 13px;
  color: #ef4444;
}

.footer {
  margin-top: 20px;
  font-size: 12px;
  color: #6b7280;
}
</style>
</head>
<body>

<div class="login-container">
  <h1>AMR ADV</h1>
  <p>Bem-vindo ao seu CRM.<br>Faça login para continuar.</p>

  <div class="input-group">
    <input type="email" id="email" placeholder="E-mail" required />
  </div>

  <div class="input-group">
    <input type="password" id="password" placeholder="Senha" required />
  </div>

  <button onclick="login()">Entrar</button>

  <div class="error" id="error"></div>

  <div class="footer">
    © 2026 AMR Software
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAFJJAqVf3ge0WDHBpmS9E6sXKvnjuFkhw",
    authDomain: "dapapp-38637.firebaseapp.com",
    projectId: "dapapp-38637",
    storageBucket: "dapapp-38637.appspot.com",
    messagingSenderId: "628852295313",
    appId: "1:628852295313:web:1234567890abcdef123456"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  window.login = function() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const errorDiv = document.getElementById("error");

    signInWithEmailAndPassword(auth, email, password)
      .then((userCredential) => {
        // Login OK
        window.location.href = "/dashboard.html"; 
      })
      .catch((error) => {
        errorDiv.innerText = "E-mail ou senha inválidos.";
      });
  }
</script>

</body>
</html>
