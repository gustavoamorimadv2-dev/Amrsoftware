<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AMR ADV - Login</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
  height: 100vh;
  background: #0f172a; /* azul escuro elegante */
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-container {
  background: #111827;
  padding: 40px;
  width: 100%;
  max-width: 380px;
  border-radius: 14px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  text-align: center;
}

.login-container h1 {
  color: #ffffff;
  font-size: 24px;
  margin-bottom: 10px;
}

.login-container p {
  color: #9ca3af;
  font-size: 14px;
  margin-bottom: 30px;
}

.input-group {
  margin-bottom: 18px;
}

.input-group input {
  width: 100%;
  padding: 14px;
  border-radius: 8px;
  border: none;
  background: #1f2937;
  color: white;
  font-size: 14px;
  outline: none;
  transition: 0.2s;
}

.input-group input:focus {
  background: #374151;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 8px;
  border: none;
  background: #2563eb;
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #1d4ed8;
}

.footer {
  margin-top: 20px;
  font-size: 12px;
  color: #6b7280;
}
</style>

</head>
<body>

<div class="login-container">
  <h1>AMR ADV</h1>
  <p>Bem-vindo ao seu CRM.<br>Faça login para continuar.</p>

  <div class="input-group">
    <input type="email" placeholder="E-mail" required />
  </div>

  <div class="input-group">
    <input type="password" placeholder="Senha" required />
  </div>

  <button>Entrar</button>

  <div class="footer">
    © 2026 AMR Software
  </div>
</div>

</body>
</html>
