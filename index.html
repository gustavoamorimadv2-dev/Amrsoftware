<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - AMR ADV</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
height:100vh;
overflow:hidden;
}

/* ===== LADO ESQUERDO ===== */
.left{
width:40%;
background:#151633;
color:#fff;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:60px;
}

.left h1{
font-size:28px;
margin-bottom:10px;
}

.left p{
font-size:14px;
margin-bottom:30px;
opacity:.8;
}

.login-box{
width:100%;
max-width:320px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:8px;
font-size:14px;
outline:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:#fff;
color:#151633;
font-weight:600;
cursor:pointer;
transition:.3s;
}

button:hover{
opacity:.85;
}

/* ===== LADO DIREITO ===== */
.right{
width:60%;
position:relative;
overflow:hidden;
}

.right video{
width:100%;
height:100%;
object-fit:cover;
}

/* RESPONSIVO */
@media(max-width:900px){
.left{width:100%}
.right{display:none}
}
</style>

<script>
/* Forçar HTTPS */
if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
location.replace('https://' + location.hostname + location.pathname + location.search);
}
</script>

</head>

<body>

<div class="left">
<h1>AMR ADV</h1>
<p>Bem-vindo ao seu CRM. Faça login para continuar.</p>

<div class="login-box">
<input type="email" id="email" placeholder="E-mail">
<input type="password" id="senha" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>
</div>

<div class="right">
<video autoplay muted loop playsinline>
<source src="videoamr.mp4" type="video/mp4">
</video>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "SUA_API_KEY",
authDomain: "SEU_DOMINIO.firebaseapp.com",
projectId: "SEU_PROJECT_ID",
appId: "SEU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){
const email = document.getElementById("email").value;
const senha = document.getElementById("senha").value;

signInWithEmailAndPassword(auth,email,senha)
.then(()=> window.location.href="dashboard.html")
.catch(()=> alert("Login inválido"));
}
</script>

</body>
