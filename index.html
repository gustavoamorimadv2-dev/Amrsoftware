<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Área do Cliente</title>

<!-- Forçar HTTPS -->
<script>
if (location.protocol !== "https:" && location.hostname !== "localhost") {
  location.replace(`https://${location.hostname}${location.pathname}${location.search}`);
}
</script>

<style>
body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial;
    background:#f5f5f7;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.card{
    background:white;
    padding:40px;
    width:320px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
    text-align:center;
}

h1{
    margin-bottom:30px;
    font-weight:600;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border-radius:12px;
    border:1px solid #ddd;
    font-size:15px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:black;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    opacity:0.85;
}

.erro{
    color:#e53935;
    font-size:14px;
    margin-bottom:15px;
}
</style>
</head>
<body>

<div class="card">
    <h1>Área do Cliente</h1>

    <div id="erro" class="erro"></div>

    <input type="email" id="email" placeholder="Seu e-mail">
    <input type="password" id="senha" placeholder="Sua senha">
    <button onclick="login()">Entrar</button>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  projectId: "SEU_PROJETO",
  storageBucket: "SEU_PROJETO.appspot.com",
  messagingSenderId: "XXXXXXX",
  appId: "XXXXXXX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function() {

    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;
    const erroDiv = document.getElementById("erro");

    erroDiv.innerHTML = "";

    signInWithEmailAndPassword(auth, email, senha)
    .then((userCredential) => {
        window.location.href = "dashboard.html";
    })
    .catch((error) => {

        if(error.code === "auth/user-not-found"){
            erroDiv.innerHTML = "Usuário não encontrado.";
        }
        else if(error.code === "auth/wrong-password"){
            erroDiv.innerHTML = "Senha incorreta.";
        }
        else if(error.code === "auth/invalid-email"){
            erroDiv.innerHTML = "E-mail inválido.";
        }
        else{
            erroDiv.innerHTML = "Erro ao fazer login.";
        }

        console.log(error);
    });
}
</script>

</body>
</html>
